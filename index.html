<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>篠崎の日記</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <h1>📖 篠崎の日記</h1>
      <div class="header-actions">
        <input type="search" id="search" placeholder="日記を検索…">
        <button id="themeToggle">🌙</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h2>毎日の記録を残そう</h2>
      <p>車・PC・学校・趣味など、自由に書けるシンプルな日記サイトです。</p>
    </section>

    <div id="posts" class="posts"></div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2026 篠崎
        の日記</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
