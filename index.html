<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>平凡大学生の日記</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <h1>📖平凡大学生の日記</h1>
      <div class="header-actions">
        <input type="search" id="search" placeholder="日記を検索…">
        <button id="themeToggle">🌙</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h2>日本に住む、とある人の毎日の記録</h2>
      <p>車・PC・学校・趣味など、自由に書くシンプルな日記サイトです。</p>
    </section>

    <a href="https://ecoro.pythonanywhere.com/" target="_blank" style="display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,#059669,#0891b2);color:white;border-radius:20px;padding:20px 24px;margin-bottom:24px;text-decoration:none;">
      <span style="font-size:40px;flex-shrink:0;">🛒</span>
      <div style="display:flex;flex-direction:column;gap:4px;">
        <strong style="font-size:17px;">大学3年生のとき作った買い物支援アプリです！</strong>
        <span style="font-size:14px;opacity:.9;">実際に使えます！特別支援学校に提供したものです。ぜひ試してみてください →</span>
      </div>
    </a>

    <div id="posts" class="posts"></div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2026 平凡大学生の日記</p>
    </div>
  </footer>

  <script type="module" src="script.js"></script>
</body>
</html>
