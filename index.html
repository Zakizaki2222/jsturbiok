<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>平凡大学生の日記</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <h1>📖平凡大学生の日記</h1>
      <div class="header-actions">
        <input type="search" id="search" placeholder="日記を検索…">
        <button id="themeToggle">🌙</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h2>日本に住む、とある人の毎日の記録</h2>
      <p>車・PC・学校・趣味など、自由に書くシンプルな日記サイトです。</p>
    </section>

    <div style="background:linear-gradient(135deg,#059669,#0891b2);border-radius:20px;margin-bottom:24px;overflow:hidden;">
      <div id="appBannerHeader" onclick="toggleAppBanner()" style="display:flex;align-items:center;gap:16px;padding:20px 24px;cursor:pointer;user-select:none;">
        <span style="font-size:36px;flex-shrink:0;">🛒</span>
        <div style="flex:1;color:white;">
          <strong style="font-size:17px;">大学3年生のとき作った買い物支援アプリです！</strong>
        </div>
        <span id="appBannerArrow" style="color:white;font-size:22px;transition:transform .3s;">▼</span>
      </div>
      <div id="appBannerBody" style="max-height:0;overflow:hidden;transition:max-height .4s ease;">
        <div style="padding:0 24px 20px 24px;color:white;">
          <p style="margin:0 0 14px;">特別支援学校に提供した買い物支援アプリです。実際に使えます！ぜひ試してみてください。</p>
          <a href="https://ecoro.pythonanywhere.com/" target="_blank" style="display:inline-block;background:white;color:#059669;font-weight:bold;padding:10px 20px;border-radius:10px;text-decoration:none;">アプリを開く →</a>
        </div>
      </div>
    </div>

    <div id="posts" class="posts"></div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2026 平凡大学生の日記</p>
    </div>
  </footer>

  <script type="module" src="script.js"></script>
  <script>
    function toggleAppBanner() {
      const body = document.getElementById('appBannerBody');
      const arrow = document.getElementById('appBannerArrow');
      if (body.style.maxHeight === '0px' || body.style.maxHeight === '') {
        body.style.maxHeight = '200px';
        arrow.style.transform = 'rotate(180deg)';
      } else {
        body.style.maxHeight = '0px';
        arrow.style.transform = 'rotate(0deg)';
      }
    }
  </script>
</body>
</html>
