<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日記 | 平凡大学生の日記</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <h1><a href="index.html">📖 平凡大学生の日記</a></h1>
    </div>
  </header>

  <main class="container">
    <article id="post" class="post-detail"></article>

    <section class="anon-comments">
      <h3>コメント（匿名OK）</h3>

      <div id="anonCommentList" class="anon-comment-list"></div>

      <form id="anonCommentForm" class="anon-comment-form">
        <input type="text" id="anonName" placeholder="名前（未入力なら「名無し」）" maxlength="30">
        <textarea id="anonMessage" placeholder="コメントを書く…" maxlength="500" required></textarea>
        <button type="submit">投稿する</button>
      </form>
    </section>

    <section class="comments">
      <h3>コメント（GitHubアカウント）</h3>
      <script src="https://giscus.app/client.js"
        data-repo="Zakizaki2222/jsturbiok"
        data-repo-id="R_kgDOTIbZSQ"
        data-category="Announcements"
        data-category-id="DIC_kwDOTIbZSc4DANMm"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="preferred_color_scheme"
        data-lang="ja"
        crossorigin="anonymous"
        async>
      </script>
    </section>
  </main>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://nksgixwpdnfatqluusxx.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_LXzFI1uEXA5xyyM5vIhl_Q_mY5PAakh';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const params = new URLSearchParams(location.search);
    const postId = params.get('id');

    async function loadPost() {
      const res = await fetch('posts.json');
      const posts = await res.json();
      const post = posts.find(p => p.id === postId);
      const container = document.getElementById('post');

      if (!post) {
        container.innerHTML = '<h2>記事が見つかりません</h2>';
        return;
      }

      container.innerHTML = `
        <h2>${post.title}</h2>
        <div class="meta">${post.date} ・ ${post.tags.join(' / ')}</div>
        <img src="${post.image}" alt="" class="detail-image">
        <p>${post.content.replace(/\n/g, '<br>')}</p>
      `;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    async function loadAnonComments() {
      const list = document.getElementById('anonCommentList');
      list.innerHTML = '読み込み中…';

      const { data, error } = await supabase
        .from('comments')
        .select('*')
        .eq('post_id', postId)
        .order('created_at', { ascending: false });

      if (error) {
        list.innerHTML = '<p>コメントの読み込みに失敗しました。</p>';
        console.error(error);
        return;
      }

      if (!data || data.length === 0) {
        list.innerHTML = '<p class="no-comments">まだコメントはありません。</p>';
        return;
      }

      list.innerHTML = data.map(c => `
        <div class="anon-comment">
          <div class="anon-comment-head">
            <span class="anon-comment-name">${escapeHtml(c.name)}</span>
            <span class="anon-comment-date">${new Date(c.created_at).toLocaleString('ja-JP')}</span>
          </div>
          <p class="anon-comment-body">${escapeHtml(c.message).replace(/\n/g, '<br>')}</p>
        </div>
      `).join('');
    }

    document.getElementById('anonCommentForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const nameInput = document.getElementById('anonName');
      const messageInput = document.getElementById('anonMessage');

      const name = nameInput.value.trim() || '名無し';
      const message = messageInput.value.trim();

      if (!message) return;

      const submitBtn = e.target.querySelector('button');
      submitBtn.disabled = true;
      submitBtn.textContent = '投稿中…';

      const { error } = await supabase
        .from('comments')
        .insert([{ post_id: postId, name, message }]);

      submitBtn.disabled = false;
      submitBtn.textContent = '投稿する';

      if (error) {
        alert('投稿に失敗しました。もう一度お試しください。');
        console.error(error);
        return;
      }

      messageInput.value = '';
      loadAnonComments();
    });

    loadPost();
    loadAnonComments();
  </script>
</body>
</html>
